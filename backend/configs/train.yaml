model:
  backbone: "dual_path_cnn"  
  neck: "simple"  # Not implemented yet
  heads: "detection_heads"
  pretrained: false
  num_classes: 2

dataset:
  train: "data/images/train"
  train_labels: "data/labels/train"
  val: "data/images/val" 
  val_labels: "data/labels/val"
  nc: 2
  names: ["fire", "smoke"]
  img_size: 640

training:
  epochs: 100
  batch_size: 8      # Reduced for memory/stability
  lr: 0.001
  min_lr: 0.0001
  weight_decay: 0.0005
  patience: 15       # Stop if no improvement
  num_workers: 2
  save_dir: "backend/models"
  save_name: "firevision_best.pt"
  resume: false

loss:
  box: "ciou"
  cls: "focal" 
  obj: "focal"
  box_weight: 5.0    # Higher box weight for detection
  cls_weight: 1.0
  obj_weight: 1.0
  focal_alpha: 0.25
  focal_gamma: 2.0